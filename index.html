<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Plazos Administrativos - Mendoza</title>
    <style>
        body { font-family: Arial, sans-serif; background: #FFFFFF; display: flex; justify-content: center; padding: 40px; }
        .container { width: 420px; }
        .card { background: #F0F9CF; padding: 28px; border-radius: 12px; box-shadow: 0 6px 16px rgba(0,0,0,0.08); }
        h1 { text-align: center; font-size: 20px; margin-bottom: 24px; color: #000000; }
        label { font-size: 14px; display: block; margin-top: 14px; }
        input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; margin-top: 5px; font-size: 14px; box-sizing: border-box; }
        .radio-group { margin-top: 16px; display: flex; gap: 20px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; margin-top: 18px; }
        .btn-calcular { background: #38B000; color: #FFFFFF; font-weight: bold; }
        .btn-calcular:hover { background: #2e9300; }
        .btn-auditoria { background: #38B000; color: #FFFFFF; }
        .btn-print { background: #000000; color: #FFFFFF; }
        .result { margin-top: 20px; background: #FFFFFF; padding: 18px; border-radius: 8px; border: 1px solid #e0e0e0; }
        .result-title { font-size: 13px; color: #555; }
        .result-date { font-size: 30px; font-weight: 700; margin-top: 4px; color: #1a1a1a; }
        .detalle { margin-top: 10px; font-size: 14px; line-height: 1.5; }
        .audit { display: none; margin-top: 15px; max-height: 200px; overflow: auto; font-size: 13px; background: #f9f9f9; padding: 10px; border-radius: 6px; border: 1px solid #ddd; }

        @media print {
            body { background: white; padding: 0; }
            .card, button, input, .radio-group, label { display: none; }
            #printArea { display: block; }
        }

        #printArea { display: none; font-family: Arial; }
        .print-title { font-size: 18px; font-weight: bold; margin-bottom: 12px; }
        .section { margin-top: 16px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Calculadora de Plazos (Mendoza)</h1>

        <label>Fecha de notificación (Inicio)</label>
        <input type="date" id="fechaInicio">

        <label>Cantidad de días</label>
        <input type="number" id="dias" placeholder="Ej: 15">

        <div class="radio-group">
            <label><input type="radio" name="tipo" value="corridos"> Corridos</label>
            <label><input type="radio" name="tipo" value="habiles" checked> Hábiles</label>
        </div>

        <button class="btn-calcular" onclick="calcular()">CALCULAR VENCIMIENTO</button>

        <div class="result">
            <div class="result-title">Vencimiento:</div>
            <div class="result-date" id="resultado">--/--/----</div>
            <div id="condicion" style="font-weight: bold; color: #38B000; margin-top: 5px;"></div>
            <div class="detalle" id="detalle"></div>
        </div>

        <button class="btn-auditoria" onclick="toggleAuditoria()">Ver detalle de días</button>
        <div class="audit" id="auditoria"></div>

        <button class="btn-print" onclick="imprimir()">Imprimir / PDF</button>
    </div>
</div>

<div id="printArea">
    <div class="print-title">Reporte de Cálculo de Plazo Administrativo</div>
    <div class="section" id="printDatos"></div>
    <div class="section">
        <strong>Fecha de Vencimiento:</strong>
        <div id="printResultado" style="font-size: 20px;"></div>
    </div>
    <div class="section">
        <strong>Resumen de días:</strong>
        <div id="printResumen"></div>
    </div>
    <div class="section">
        <strong>Auditoría paso a paso:</strong>
        <div id="printAuditoria"></div>
    </div>
</div>

<script>
    // Feriados actualizados para Mendoza (Nacionales + 25 de Julio)
    const feriados = [
        "2025-01-01", "2025-03-03", "2025-03-04", "2025-03-24", "2025-04-02", "2025-04-18",
        "2025-05-01", "2025-05-25", "2025-06-16", "2025-06-20", "2025-07-09", "2025-07-25",
        "2025-08-15", "2025-08-17", "2025-10-12", "2025-11-24", "2025-12-08", "2025-12-25",
        "2026-01-01", "2026-03-23", "2026-03-24", "2026-04-02", "2026-04-03", "2026-05-01",
        "2026-05-25", "2026-06-15", "2026-06-20", "2026-07-09", "2026-07-25", "2026-08-17",
        "2026-10-12", "2026-11-23", "2026-12-08", "2026-12-25"
    ];

    const asuetos = ["2025-12-24", "2025-12-31", "2026-12-24", "2026-12-31"];

    function parseFechaLocal(s) {
        if(!s) return null;
        let parts = s.split('-');
        return new Date(parts[0], parts[1]-1, parts[2]);
    }

    function calcular() {
        const inputFecha = document.getElementById("fechaInicio").value;
        const inputDias = document.getElementById("dias").value;
        const tipo = document.querySelector('input[name="tipo"]:checked').value;

        if (!inputFecha || !inputDias) {
            alert("Por favor completa la fecha y la cantidad de días.");
            return;
        }

        let fecha = parseFechaLocal(inputFecha);
        let diasParaSumar = parseInt(inputDias);
        let cont = 0;
        let sab = 0, dom = 0, fer = 0;
        let auditLog = [];

        // Los plazos administrativos corren a partir del día siguiente a la notificación
        while (cont < diasParaSumar) {
            fecha.setDate(fecha.getDate() + 1);
            
            let dSemana = fecha.getDay(); 
            let iso = fecha.toISOString().split('T')[0];
            let fLabel = fecha.toLocaleDateString('es-AR');

            if (tipo === "corridos") {
                cont++;
                auditLog.push(fLabel + " - Contado (Corrido)");
            } else {
                if (dSemana === 0) {
                    dom++;
                    auditLog.push(fLabel + " - Domingo (Excluido)");
                } else if (dSemana === 6) {
                    sab++;
                    auditLog.push(fLabel + " - Sábado (Excluido)");
                } else if (feriados.includes(iso) || asuetos.includes(iso)) {
                    fer++;
                    auditLog.push(fLabel + " - Feriado/Asueto (Excluido)");
                } else {
                    cont++;
                    auditLog.push(fLabel + " - Contado (Hábiles)");
                }
            }
        }

        const finalStr = fecha.toLocaleDateString('es-AR');
        
        // Mostrar en pantalla
        document.getElementById("resultado").innerText = finalStr;
        document.getElementById("condicion").innerText = diasParaSumar + " días " + tipo;
        document.getElementById("detalle").innerHTML = `Sábados: ${sab}<br>Domingos: ${dom}<br>Feriados: ${fer}`;
        document.getElementById("auditoria").innerHTML = auditLog.join("<br>");

        // Preparar Impresión
        document.getElementById("printDatos").innerHTML = "Fecha inicio: " + parseFechaLocal(inputFecha).toLocaleDateString('es-AR') + "<br>Plazo: " + diasParaSumar + " días " + tipo;
        document.getElementById("printResultado").innerText = finalStr;
        document.getElementById("printResumen").innerHTML = `Sábados: ${sab}, Domingos: ${dom}, Feriados: ${fer}`;
        document.getElementById("printAuditoria").innerHTML = auditLog.join("<br>");
    }

    function toggleAuditoria() {
        let div = document.getElementById("auditoria");
        div.style.display = (div.style.display === "block") ? "none" : "block";
    }

    function imprimir() {
        window.print();
    }
</script>

</body>
</html>
