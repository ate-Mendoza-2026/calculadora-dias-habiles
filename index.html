<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Plazos Administrativos - Mendoza</title>
    <style>
        :root { --primary: #38B000; --dark: #1b4332; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fdfdfd; display: flex; justify-content: center; padding: 20px; color: #333; }
        .container { width: 100%; max-width: 500px; }
        .card { background: #F0F9CF; padding: 30px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border: 1px solid #d4e3a3; }
        h1 { text-align: center; font-size: 1.3rem; margin-bottom: 25px; color: #000; font-weight: 800; text-transform: uppercase; line-height: 1.2; }
        
        .input-group { margin-bottom: 15px; }
        label { font-size: 0.9rem; font-weight: bold; display: block; margin-bottom: 5px; color: var(--dark); }
        input[type="date"], input[type="number"] { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #bccca3; font-size: 1rem; box-sizing: border-box; }
        
        .radio-group { display: flex; gap: 15px; background: rgba(255,255,255,0.5); padding: 15px; border-radius: 8px; margin: 20px 0; border: 1px dashed var(--primary); }
        .radio-group label { margin: 0; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: normal; }
        
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
        .btn-calcular { background: var(--primary); color: white; box-shadow: 0 4px 0 #2d8a00; }
        .btn-calcular:active { transform: translateY(3px); box-shadow: none; }
        
        .btn-auditoria { background: white; color: var(--primary); border: 2px solid var(--primary); margin-top: 10px; }
        .btn-print { background: #000; color: white; margin-top: 5px; }
        
        .result { margin-top: 25px; background: #fff; padding: 20px; border-radius: 12px; border-left: 6px solid var(--primary); display: none; }
        .result-title { font-size: 0.8rem; color: #666; text-transform: uppercase; }
        .result-date { font-size: 2.2rem; font-weight: 900; color: #000; margin: 5px 0; }
        
        .audit { display: none; margin-top: 15px; max-height: 350px; overflow-y: auto; font-size: 0.85rem; background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
        ul { padding-left: 20px; margin: 0; }
        li { margin-bottom: 6px; border-bottom: 1px solid #f0f0f0; padding-bottom: 2px; list-style: none; }
        .excluido { color: #d90429; font-weight: 500; }
        .contado { color: #38B000; font-weight: 500; }

        @media print {
            .no-print, button, .radio-group, input, label { display: none !important; }
            body { background: white; padding: 0; }
            .card { box-shadow: none; border: none; width: 100%; background: white !important; }
            .result { display: block !important; border: 1px solid #ccc; margin-bottom: 20px; }
            .audit { display: block !important; max-height: none; overflow: visible; }
            h1 { font-size: 1.5rem; margin-bottom: 40px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Calculadora de Plazos Administrativos de la Provincia de Mendoza</h1>

        <div class="no-print">
            <div class="input-group">
                <label>Fecha de Notificación</label>
                <input type="date" id="fechaInicio">
            </div>

            <div class="input-group">
                <label>Plazo (en días)</label>
                <input type="number" id="dias" placeholder="Ej: 15">
            </div>

            <div class="radio-group">
                <label><input type="radio" name="tipo" value="corridos"> Corridos</label>
                <label><input type="radio" name="tipo" value="habiles" checked> Hábiles</label>
            </div>

            <button class="btn-calcular" onclick="ejecutarCalculo()">CALCULAR VENCIMIENTO</button>
        </div>

        <div class="result" id="panelResultado">
            <div class="result-title">Fecha de Vencimiento:</div>
            <div class="result-date" id="txtResultado">--/--/----</div>
            <div id="txtDetalle" style="font-size: 0.9rem; line-height: 1.4; margin-top: 10px;"></div>
        </div>

        <div id="controlesExtra" style="display:none;">
            <button class="btn-auditoria no-print" onclick="toggleAudit()">Ver detalle paso a paso</button>
            <div class="audit" id="panelAudit"></div>
            <button class="btn-print no-print" onclick="window.print()">Imprimir o Guardar PDF</button>
        </div>
    </div>
</div>

<script>
    // Mapeo de feriados con sus nombres (Nacionales y Mendoza)
    const FERIADOS_DATA = {
        "2025-01-01": "Año Nuevo",
        "2025-03-03": "Carnaval",
        "2025-03-04": "Carnaval",
        "2025-03-24": "Día de la Memoria",
        "2025-04-02": "Día del Veterano y de los Caídos en la Guerra de Malvinas",
        "2025-04-18": "Viernes Santo",
        "2025-05-01": "Día del Trabajador",
        "2025-05-25": "Revolución de Mayo",
        "2025-06-16": "Paso a la Inmortalidad de Güemes",
        "2025-06-20": "Día de la Bandera",
        "2025-07-09": "Día de la Independencia",
        "2025-07-25": "Santo Patrono Santiago (Mendoza)",
        "2025-08-15": "Paso a la Inmortalidad de San Martín (Trasladado)",
        "2025-08-17": "Paso a la Inmortalidad de San Martín",
        "2025-10-12": "Día del Respeto a la Diversidad Cultural",
        "2025-11-24": "Día de la Soberanía Nacional",
        "2025-12-08": "Inmaculada Concepción",
        "2025-12-25": "Navidad",
        "2025-12-24": "Asueto Administrativo",
        "2025-12-31": "Asueto Administrativo",
        // 2026
        "2026-01-01": "Año Nuevo",
        "2026-03-23": "Feriado con fines turísticos",
        "2026-03-24": "Día de la Memoria",
        "2026-04-02": "Día de las Malvinas",
        "2026-04-03": "Viernes Santo",
        "2026-05-01": "Día del Trabajador",
        "2026-05-25": "Revolución de Mayo",
        "2026-06-15": "Paso a la Inmortalidad de Güemes",
        "2026-06-20": "Día de la Bandera",
        "2026-07-09": "Día de la Independencia",
        "2026-07-25": "Santo Patrono Santiago (Mendoza)",
        "2026-08-17": "Paso a la Inmortalidad de San Martín",
        "2026-10-12": "Día de la Diversidad Cultural",
        "2026-11-23": "Día de la Soberanía Nacional",
        "2026-12-08": "Inmaculada Concepción",
        "2026-12-25": "Navidad"
    };

    function ejecutarCalculo() {
        const fInput = document.getElementById("fechaInicio").value;
        const dInput = document.getElementById("dias").value;
        const tipo = document.querySelector('input[name="tipo"]:checked').value;

        if (!fInput || !dInput || dInput <= 0) {
            alert("⚠️ Por favor, ingresa una fecha válida y una cantidad de días mayor a 0.");
            return;
        }

        let [y, m, d] = fInput.split('-');
        let fecha = new Date(y, m - 1, d);
        let fechaNotif = new Date(y, m - 1, d);
        
        let diasASumar = parseInt(dInput);
        let cont = 0, sab = 0, dom = 0, fer = 0;
        let logs = [];

        while (cont < diasASumar) {
            fecha.setDate(fecha.getDate() + 1);
            let diaSemana = fecha.getDay(); 
            let iso = fecha.toISOString().split('T')[0];
            let label = fecha.toLocaleDateString('es-AR');

            if (tipo === "corridos") {
                cont++;
                logs.push(`<li>${label}: <span class="contado">Contado (Corrido)</span></li>`);
            } else {
                if (diaSemana === 0) {
                    dom++;
                    logs.push(`<li>${label}: <span class="excluido">Omitido (Domingo)</span></li>`);
                } else if (diaSemana === 6) {
                    sab++;
                    logs.push(`<li>${label}: <span class="excluido">Omitido (Sábado)</span></li>`);
                } else if (FERIADOS_DATA[iso]) {
                    fer++;
                    logs.push(`<li>${label}: <span class="excluido">Omitido (Feriado: ${FERIADOS_DATA[iso]})</span></li>`);
                } else {
                    cont++;
                    logs.push(`<li>${label}: <span class="contado">Contado (Día Hábil)</span></li>`);
                }
            }
        }

        document.getElementById("panelResultado").style.display = "block";
        document.getElementById("controlesExtra").style.display = "block";
        
        document.getElementById("txtResultado").innerText = fecha.toLocaleDateString('es-AR');
        document.getElementById("txtDetalle").innerHTML = `
            <strong>Resumen del cómputo:</strong><br>
            Plazo de ${diasASumar} días ${tipo}.<br>
            Se excluyeron ${sab} sábados, ${dom} domingos y ${fer} feriados/asuetos.
        `;
        
        document.getElementById("panelAudit").innerHTML = `
            <p><strong>Detalle paso a paso (Notificado el ${fechaNotif.toLocaleDateString('es-AR')}):</strong></p>
            <ul>${logs.join('')}</ul>
        `;
    }

    function toggleAudit() {
        const p = document.getElementById("panelAudit");
        p.style.display = (p.style.display === "block") ? "none" : "block";
    }
</script>

</body>
</html>
