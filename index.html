<script>
    // Base de datos de feriados actualizada con la lista oficial 2025-2026
    const FERIADOS_DATA = {
        // --- AÑO 2025 ---
        "2025-01-01": { n: "Año Nuevo", t: "nac" },
        "2025-03-03": { n: "Carnaval", t: "nac" },
        "2025-03-04": { n: "Carnaval", t: "nac" },
        "2025-03-24": { n: "Día de la Memoria", t: "nac" },
        "2025-04-02": { n: "Día de Malvinas", t: "nac" },
        "2025-04-18": { n: "Viernes Santo", t: "nac" },
        "2025-05-01": { n: "Día del Trabajador", t: "nac" },
        "2025-05-25": { n: "Revolución de Mayo", t: "nac" },
        "2025-06-16": { n: "Paso a Güemes", t: "nac" },
        "2025-06-20": { n: "Día de la Bandera", t: "nac" },
        "2025-07-09": { n: "Día de la Independencia", t: "nac" },
        "2025-07-25": { n: "Santo Patrono Santiago", t: "mza" },
        "2025-08-15": { n: "Paso a San Martín (Trasl.)", t: "nac" },
        "2025-10-12": { n: "Día de la Diversidad Cultural", t: "nac" },
        "2025-11-24": { n: "Día de la Soberanía Nacional", t: "nac" },
        "2025-12-08": { n: "Inmaculada Concepción", t: "nac" },
        "2025-12-25": { n: "Navidad", t: "nac" },

        // --- AÑO 2026 (Según lista oficial compartida) ---
        "2026-01-01": { n: "Año Nuevo", t: "nac" },
        "2026-02-16": { n: "Carnaval", t: "nac" },
        "2026-02-17": { n: "Carnaval", t: "nac" },
        "2026-03-23": { n: "Feriado Puente Turístico", t: "nac" },
        "2026-03-24": { n: "Día de la Memoria", t: "nac" },
        "2026-04-02": { n: "Día de Malvinas", t: "nac" },
        "2026-04-03": { n: "Viernes Santo", t: "nac" },
        "2026-05-01": { n: "Día del Trabajador", t: "nac" },
        "2026-05-25": { n: "Revolución de Mayo", t: "nac" },
        "2026-06-15": { n: "Paso a Güemes (Trasl.)", t: "nac" },
        "2026-06-20": { n: "Día de la Bandera", t: "nac" },
        "2026-07-09": { n: "Día de la Independencia", t: "nac" },
        "2026-07-10": { n: "Feriado Puente Turístico", t: "nac" },
        "2026-07-25": { n: "Santo Patrono Santiago", t: "mza" }, // Feriado Provincial Mendoza
        "2026-08-17": { n: "Paso a San Martín", t: "nac" },
        "2026-10-12": { n: "Día de la Diversidad Cultural", t: "nac" },
        "2026-11-23": { n: "Día de la Soberanía Nacional", t: "nac" },
        "2026-12-07": { n: "Feriado Puente Turístico", t: "nac" },
        "2026-12-08": { n: "Inmaculada Concepción", t: "nac" },
        "2026-12-25": { n: "Navidad", t: "nac" }
    };

    function ejecutarCalculo() {
        const jur = document.getElementById("jurisdiccion").value;
        const fInput = document.getElementById("fechaInicio").value;
        const dInput = document.getElementById("dias").value;
        const tipo = document.querySelector('input[name="tipo"]:checked').value;

        if (!fInput || !dInput || dInput <= 0) {
            alert("⚠️ Por favor, ingresa datos válidos.");
            return;
        }

        let [y, m, d] = fInput.split('-');
        let fecha = new Date(y, m - 1, d);
        let fechaNotif = new Date(y, m - 1, d);
        
        let diasASumar = parseInt(dInput);
        let cont = 0, sab = 0, dom = 0, fer = 0;
        let logs = [];

        while (cont < diasASumar) {
            fecha.setDate(fecha.getDate() + 1);
            let ds = fecha.getDay(); 
            let iso = fecha.toISOString().split('T')[0];
            let label = fecha.toLocaleDateString('es-AR');

            let feriado = FERIADOS_DATA[iso];
            let esFeriadoExcluyente = feriado && (feriado.t === "nac" || (feriado.t === "mza" && jur === "mendoza"));

            if (tipo === "corridos") {
                cont++;
                logs.push(`<li>${label}: <span class="contado">Contado</span></li>`);
            } else {
                if (ds === 0) { dom++; logs.push(`<li>${label}: <span class="excluido">Omitido (Domingo)</span></li>`); }
                else if (ds === 6) { sab++; logs.push(`<li>${label}: <span class="excluido">Omitido (Sábado)</span></li>`); }
                else if (esFeriadoExcluyente) {
                    fer++;
                    logs.push(`<li>${label}: <span class="excluido">Omitido (${feriado.n})</span></li>`);
                } else {
                    cont++;
                    logs.push(`<li>${label}: <span class="contado">Contado</span></li>`);
                }
            }
        }

        document.getElementById("panelResultado").style.display = "block";
        document.getElementById("controlesExtra").style.display = "block";
        document.getElementById("txtResultado").innerText = fecha.toLocaleDateString('es-AR');
        document.getElementById("txtDetalle").innerHTML = `
            <strong>Ámbito feriados:</strong> ${jur === 'mendoza' ? 'Provincial (Mendoza)' : 'Nacional'}<br>
            <strong>Excluidos:</strong> ${sab} Sáb, ${dom} Dom, ${fer} Feriados/Asuetos.
        `;
        document.getElementById("panelAudit").innerHTML = `
            <p><strong>Cómputo desde notificación (${fechaNotif.toLocaleDateString('es-AR')}):</strong></p>
            <ul>${logs.join('')}</ul>
        `;
    }

    function toggleAudit() {
        const p = document.getElementById("panelAudit");
        p.style.display = (p.style.display === "block") ? "none" : "block";
    }
</script>
