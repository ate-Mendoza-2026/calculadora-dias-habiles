<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora de Plazos Administrativos</title>

<style>

body{
font-family: Arial, sans-serif;
background:#FFFFFF;
display:flex;
justify-content:center;
padding:40px;
}

.container{
width:420px;
}

.card{
background:#F0F9CF;
padding:28px;
border-radius:12px;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
}

h1{
text-align:center;
font-size:20px;
margin-bottom:24px;
color:#000000;
}

label{
font-size:14px;
display:block;
margin-top:14px;
}

input{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
margin-top:5px;
font-size:14px;
}

.radio-group{
margin-top:16px;
display:flex;
gap:20px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
font-size:15px;
cursor:pointer;
margin-top:18px;
}

.btn-calcular{
background:#38B000;
color:#FFFFFF;
}

.btn-calcular:hover{
background:#2e9300;
}

.btn-auditoria{
background:#38B000;
color:#FFFFFF;
}

.btn-print{
background:#000000;
color:#FFFFFF;
}

.result{
margin-top:20px;
background:#FFFFFF;
padding:18px;
border-radius:8px;
}

.result-title{
font-size:13px;
color:#555;
}

.result-date{
font-size:30px;
font-weight:700;
margin-top:4px;
}

.detalle{
margin-top:10px;
font-size:14px;
}

.audit{
display:none;
margin-top:15px;
max-height:200px;
overflow:auto;
font-size:13px;
background:white;
padding:10px;
border-radius:6px;
}

/* IMPRESIÓN */

@media print{

body{
background:white;
padding:0;
}

.card,button,input,.radio-group{
display:none;
}

#printArea{
display:block;
}

}

#printArea{
display:none;
font-family:Arial;
}

.print-title{
font-size:18px;
font-weight:bold;
margin-bottom:12px;
}

.section{
margin-top:16px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>Calculadora de Plazos Administrativos</h1>

<label>Fecha inicial</label>
<input type="date" id="fechaInicio">

<label>Cantidad de días</label>
<input type="number" id="dias">

<div class="radio-group">
<label><input type="radio" name="tipo" value="corridos"> Corridos</label>
<label><input type="radio" name="tipo" value="habiles" checked> Hábiles</label>
</div>

<button class="btn-calcular" onclick="calcular()">Calcular fecha</button>

<div class="result">

<div class="result-title">Fecha resultante</div>
<div class="result-date" id="resultado">--/--/----</div>

<div id="condicion"></div>

<div class="detalle" id="detalle"></div>

</div>

<button class="btn-auditoria" onclick="toggleAuditoria()">Mostrar auditoría</button>

<div class="audit" id="auditoria"></div>

<button class="btn-print" onclick="imprimir()">Imprimir / Guardar PDF</button>

</div>

</div>

<div id="printArea">

<div class="print-title">
Calculadora de Plazos Administrativos  
Provincia de Mendoza – Argentina
</div>

<div class="section" id="printDatos"></div>

<div class="section">
<b>Resultado</b><br>
<div id="printResultado"></div>
</div>

<div class="section">
<b>Resumen de exclusiones</b><br>
<div id="printResumen"></div>
</div>

<div class="section">
<b>Detalle de auditoría</b><br>
<div id="printAuditoria"></div>
</div>

</div>

<script>

const feriados=[
"2025-01-01",
"2025-03-24",
"2025-04-02",
"2025-05-01",
"2025-05-25",
"2025-06-20",
"2025-07-09",
"2025-07-25",
"2025-12-08",
"2025-12-25",

"2026-01-01",
"2026-03-24",
"2026-04-02",
"2026-05-01",
"2026-05-25",
"2026-06-20",
"2026-07-09",
"2026-07-25",
"2026-12-08",
"2026-12-25"
];

const noLaborables=[
"2025-12-24",
"2025-12-31",
"2026-12-24",
"2026-12-31"
];

function esFeriado(f){
let s=f.toISOString().split("T")[0];
return feriados.includes(s);
}

function esNoLaborable(f){
let s=f.toISOString().split("T")[0];
return noLaborables.includes(s);
}

function calcular(){

let inicio=new Date(document.getElementById("fechaInicio").value);
let dias=parseInt(document.getElementById("dias").value);
let tipo=document.querySelector('input[name="tipo"]:checked').value;

let fecha=new Date(inicio);

let cont=0;
let sab=0;
let dom=0;
let fer=0;
let aud=[];

while(cont<dias){

fecha.setDate(fecha.getDate()+1);

let dia=fecha.getDay();
let texto=fecha.toLocaleDateString();

if(tipo==="corridos"){
cont++;
aud.push(texto+" – contado");
continue;
}

if(esFeriado(fecha)){
fer++;
aud.push(texto+" – feriado (excluido)");
continue;
}

if(esNoLaborable(fecha)){
aud.push(texto+" – no laborable (excluido)");
continue;
}

if(dia===6){
sab++;
aud.push(texto+" – sábado (excluido)");
continue;
}

if(dia===0){
dom++;
aud.push(texto+" – domingo (excluido)");
continue;
}

cont++;
aud.push(texto+" – contado");

}

document.getElementById("resultado").innerText=fecha.toLocaleDateString();

document.getElementById("condicion").innerText=
dias+" días "+tipo;

document.getElementById("detalle").innerHTML=
"Feriados: "+fer+"<br>"+
"Sábados: "+sab+"<br>"+
"Domingos: "+dom;

document.getElementById("auditoria").innerHTML=aud.join("<br>");

document.getElementById("printDatos").innerHTML=
"Fecha inicial: "+inicio.toLocaleDateString()+"<br>"+
"Tipo de plazo: "+tipo+"<br>"+
"Cantidad de días: "+dias;

document.getElementById("printResultado").innerText=
fecha.toLocaleDateString();

document.getElementById("printResumen").innerHTML=
"Feriados: "+fer+"<br>"+
"Sábados: "+sab+"<br>"+
"Domingos: "+dom;

document.getElementById("printAuditoria").innerHTML=
aud.join("<br>");

}

function toggleAuditoria(){
let a=document.getElementById("auditoria");
a.style.display = a.style.display==="block" ? "none" : "block";
}

function imprimir(){
window.print();
}

</script>

</body>
</html>
