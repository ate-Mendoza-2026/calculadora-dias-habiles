```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora de Plazos Administrativos</title>

<style>

body{
font-family: Arial;
background:#ffffff;

}

.card{
background:#F0F9CF;

}

}

}

}

margin-top:10px;
}

</style>
</head>

<body>

<div class="card">

<h1>Calculadora de Plazos Administrativos</h1>

<label>Fecha inicial</label>
<input type="date" id="fechaInicio">

<label>Cantidad de días</label>
<input type="number" id="dias">

<div class="radio">
<input type="radio" name="tipo" value="corridos"> Corridos
<input type="radio" name="tipo" value="habiles" checked> Hábiles
</div>

<button onclick="calcular()">Calcular fecha</button>

<div class="result">

<div>Fecha resultante</div>
<h2 id="resultado">--/--/----</h2>

<div id="condicion"></div>

<div class="detail" id="detalle"></div>

<button onclick="toggleAuditoria()">Mostrar auditoría</button>

<div class="audit" id="auditoria"></div>

<button class="print" onclick="window.print()">Imprimir / Guardar PDF</button>

</div>

</div>

<script>

/* =======================
FERIADOS ARGENTINA
======================= */

const feriados = {

"2025":[
"2025-01-01",
"2025-03-03",
"2025-03-04",
"2025-03-24",
"2025-04-02",
"2025-04-18",
"2025-05-01",
"2025-05-25",
"2025-06-20",
"2025-07-09",
"2025-07-25",
"2025-12-08",
"2025-12-25"
],

"2026":[
"2026-01-01",
"2026-02-16",
"2026-02-17",
"2026-03-24",
"2026-04-02",
"2026-04-03",
"2026-05-01",
"2026-05-25",
"2026-06-20",
"2026-07-09",
"2026-07-25",
"2026-12-08",
"2026-12-25"
]

};

/* =======================
FUNCIONES
======================= */

function esFeriado(fecha){

let y = fecha.getFullYear();
let f = fecha.toISOString().split("T")[0];

if(feriados[y]){
return feriados[y].includes(f);
}

return false;

}

function calcular(){

let inicio = new Date(document.getElementById("fechaInicio").value);
let dias = parseInt(document.getElementById("dias").value);
let tipo = document.querySelector('input[name="tipo"]:checked').value;

let fecha = new Date(inicio);

let contador=0;

let sabados=0;
let domingos=0;
let feriadosCount=0;

let auditoriaHTML="<table><tr><th>Fecha</th><th>Estado</th></tr>";

while(contador < dias){

fecha.setDate(fecha.getDate()+1);

let diaSemana = fecha.getDay();
let fechaStr = fecha.toLocaleDateString();

if(tipo==="corridos"){

contador++;
auditoriaHTML+=`<tr><td>${fechaStr}</td><td>Contado</td></tr>`;

}else{

if(esFeriado(fecha)){
feriadosCount++;
auditoriaHTML+=`<tr><td>${fechaStr}</td><td>Feriado (excluido)</td></tr>`;
continue;
}

if(diaSemana===6){
sabados++;
auditoriaHTML+=`<tr><td>${fechaStr}</td><td>Sábado (excluido)</td></tr>`;
continue;
}

if(diaSemana===0){
domingos++;
auditoriaHTML+=`<tr><td>${fechaStr}</td><td>Domingo (excluido)</td></tr>`;
continue;
}

contador++;
auditoriaHTML+=`<tr><td>${fechaStr}</td><td>Contado</td></tr>`;

}

}

auditoriaHTML+="</table>";

document.getElementById("resultado").innerText = fecha.toLocaleDateString();

document.getElementById("condicion").innerText =
dias+" días "+tipo;

document.getElementById("detalle").innerHTML = `
<b>Detalle del cálculo</b><br>
Feriados: ${feriadosCount}<br>
Sábados: ${sabados}<br>
Domingos: ${domingos}
`;

document.getElementById("auditoria").innerHTML = auditoriaHTML;

}

/* =======================
AUDITORIA
======================= */

function toggleAuditoria(){

let a = document.getElementById("auditoria");

if(a.style.display==="none"){
a.style.display="block";
}else{
a.style.display="none";
}

}

</script>

</body>
</html>
