<style>

body{

</head>

<body>

<div class="container">

<div class="card">

<h1>Calculadora de Plazos Administrativos</h1>

<label>Fecha inicial</label>
<input type="date" id="fechaInicio">

<label>Cantidad de días</label>
<input type="number" id="dias">

<div class="radio-group">
<label><input type="radio" name="tipo" value="corridos"> Corridos</label>
<label><input type="radio" name="tipo" value="habiles" checked> Hábiles</label>
</div>

<button class="btn-calcular" onclick="calcular()">Calcular fecha</button>

<div class="result">

<div class="result-title">Fecha resultante</div>
<div class="result-date" id="resultado">--/--/----</div>

<div id="condicion"></div>

<div class="detalle" id="detalle"></div>

</div>

<button class="btn-auditoria" onclick="toggleAuditoria()">Mostrar auditoría</button>

<div class="audit" id="auditoria"></div>

<button class="btn-print" onclick="window.print()">Imprimir / Guardar PDF</button>

</div>

</div>

<script>

/* =======================
FERIADOS
======================= */

const feriados = {

"2025":[
"2025-01-01",
"2025-03-03",
"2025-03-04",
"2025-03-24",
"2025-04-02",
"2025-04-18",
"2025-05-01",
"2025-05-25",
"2025-06-20",
"2025-07-09",
"2025-07-25",
"2025-12-08",
"2025-12-25"
],

"2026":[
"2026-01-01",
"2026-02-16",
"2026-02-17",
"2026-03-24",
"2026-04-02",
"2026-04-03",
"2026-05-01",
"2026-05-25",
"2026-06-20",
"2026-07-09",
"2026-07-25",
"2026-12-08",
"2026-12-25"
]

};

/* =======================
UTILIDADES
======================= */

function esFeriado(fecha){

let y = fecha.getFullYear();
let f = fecha.toISOString().split("T")[0];

if(feriados[y]){
return feriados[y].includes(f);
}

return false;

}

/* =======================
CALCULO
======================= */

function calcular(){

let inicio = new Date(document.getElementById("fechaInicio").value);
let dias = parseInt(document.getElementById("dias").value);
let tipo = document.querySelector('input[name="tipo"]:checked').value;

let fecha = new Date(inicio);

let contador=0;
let sabados=0;
let domingos=0;
let feriadosCount=0;

let auditoria="<table><tr><th>Fecha</th><th>Estado</th></tr>";

while(contador < dias){

fecha.setDate(fecha.getDate()+1);

let dia = fecha.getDay();
let fechaStr = fecha.toLocaleDateString();

if(tipo==="corridos"){

contador++;
auditoria+=`<tr><td>${fechaStr}</td><td>Contado</td></tr>`;

}else{

if(esFeriado(fecha)){
feriadosCount++;
auditoria+=`<tr><td>${fechaStr}</td><td>Feriado (excluido)</td></tr>`;
continue;
}

if(dia===6){
sabados++;
auditoria+=`<tr><td>${fechaStr}</td><td>Sábado (excluido)</td></tr>`;
continue;
}

if(dia===0){
domingos++;
auditoria+=`<tr><td>${fechaStr}</td><td>Domingo (excluido)</td></tr>`;
continue;
}

contador++;
auditoria+=`<tr><td>${fechaStr}</td><td>Contado</td></tr>`;

}

}

auditoria+="</table>";

document.getElementById("resultado").innerText = fecha.toLocaleDateString();

document.getElementById("condicion").innerText =
dias+" días "+tipo;

document.getElementById("detalle").innerHTML = `
Feriados: ${feriadosCount}<br>
Sábados: ${sabados}<br>
Domingos: ${domingos}
`;

document.getElementById("auditoria").innerHTML = auditoria;

}

/* =======================
AUDITORIA
======================= */

function toggleAuditoria(){

let a=document.getElementById("auditoria");

a.style.display = a.style.display==="block" ? "none" : "block";

}

</script>

</body>
</html>
